# =============================================================================
# ServiceHub — Docker Compose (Development)
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. Run: docker-compose up --build
#   3. Frontend:  http://localhost:3000
#   4. API:       http://localhost:8080/api/v1/
#   5. Swagger:   http://localhost:8080/api/docs
#   6. MailHog:   http://localhost:8025
#   7. pgAdmin:   http://localhost:5050
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: servicehub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-servicehub}
      POSTGRES_USER: ${DB_USERNAME:-servicehub_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_use_strong_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./devops/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-servicehub_app} -d ${DB_NAME:-servicehub}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # Spring Boot API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: servicehub-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:${DB_PORT:-5432}/${DB_NAME:-servicehub}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-servicehub_app}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-changeme_use_strong_password}
      JWT_SECRET: ${JWT_SECRET:-changeme_generate_a_256bit_secret_key}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FILE_UPLOAD_DIR: /data/uploads
      FILE_MAX_SIZE_MB: ${FILE_MAX_SIZE_MB:-5}
      FILE_MAX_PER_REQUEST: ${FILE_MAX_PER_REQUEST:-5}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@servicehub.local}
      MAIL_ENABLED: ${MAIL_ENABLED:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    container_name: servicehub-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      # Server-side API URL (container-to-container for SSR)
      API_INTERNAL_URL: http://api:8080/api/v1
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ---------------------------------------------------------------------------
  # MailHog — SMTP Trap (Development & Testing Only)
  # ---------------------------------------------------------------------------
  # Catches all outgoing emails so no real emails are sent during development.
  # Web UI at http://localhost:8025 to view captured emails.
  # SMTP at port 1025 (no auth required).
  mailhog:
    image: mailhog/mailhog:latest
    container_name: servicehub-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # pgAdmin — Database Admin UI (Development Only)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: servicehub-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@servicehub.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    profiles:
      - dev

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  pgdata:
    name: servicehub-pgdata
  uploads_data:
    name: servicehub-uploads
  pgadmin_data:
    name: servicehub-pgadmin
